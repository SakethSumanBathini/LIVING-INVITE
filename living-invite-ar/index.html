<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=1, user-scalable=no, viewport-fit=cover" />
  <meta name="theme-color" content="#06352a" />
  <title>Living Invite — AR</title>

  <!-- SELF-HOSTED engine libs (copy the two files into lib/). NEVER use a CDN. -->
  <script src="lib/aframe.min.js"></script>
  <script src="lib/mindar-image-aframe.prod.js"></script>
  <script>window.THREE = window.THREE || (window.AFRAME && AFRAME.THREE);</script>

  <link rel="stylesheet" href="engine/ar.css" />

  <!-- ============ PREMIUM START / LOADING / ERROR SKIN (visual only) ============ -->
  <style>
    :root{
      --gold:#e6c868; --gold-lt:#f7e9b0; --gold-dp:#b8902f; --gold-dk:#8a6a1f;
      --ink:#f6efe0; --inkdim:rgba(246,239,224,.74);
      --em1:#0d4a39; --em2:#062a20; --em3:#03150f;
    }
    /* keep engine behaviour intact */
    .screen.hidden{ display:none !important; }

    /* ---- rich emerald velvet backdrop for all overlay screens ---- */
    .screen{
      position:fixed; inset:0; z-index:30;
      display:flex; flex-direction:column; align-items:center; justify-content:center;
      gap:18px; text-align:center; padding:32px;
      overflow:hidden;
      background:
        radial-gradient(130% 100% at 50% 14%, var(--em1) 0%, var(--em2) 55%, var(--em3) 100%);
    }
    /* slow rotating light-ray sheen */
    .screen::before{
      content:""; position:absolute; left:50%; top:42%;
      width:160vmax; height:160vmax; transform:translate(-50%,-50%);
      background:conic-gradient(from 0deg,
        rgba(230,200,104,0) 0deg, rgba(230,200,104,.06) 26deg, rgba(230,200,104,0) 60deg,
        rgba(230,200,104,0) 180deg, rgba(230,200,104,.05) 210deg, rgba(230,200,104,0) 250deg,
        rgba(230,200,104,0) 360deg);
      animation:spinRays 38s linear infinite; pointer-events:none; z-index:0;
    }
    /* concentric mandala watermark + vignette */
    .screen::after{
      content:""; position:absolute; inset:0; pointer-events:none; z-index:0;
      background:
        repeating-radial-gradient(circle at 50% 40%, rgba(230,200,104,.05) 0 1px, rgba(0,0,0,0) 1px 46px),
        radial-gradient(120% 100% at 50% 50%, rgba(0,0,0,0) 52%, rgba(0,0,0,.55) 100%);
    }
    #fxCanvas{ position:absolute; inset:0; width:100%; height:100%; z-index:1; pointer-events:none; }
    .cardEdge{ position:absolute; inset:15px; border:1px solid rgba(230,200,104,.30); border-radius:14px;
      box-shadow:inset 0 0 0 4px rgba(230,200,104,.06), inset 0 0 40px rgba(0,0,0,.30);
      pointer-events:none; z-index:2; animation:rise 1.1s ease .1s both; }
    .cardEdge i{ position:absolute; width:16px; height:16px; border:2px solid var(--gold); opacity:.8; }
    .cardEdge i.tl{ left:-1px; top:-1px; border-right:0; border-bottom:0; border-top-left-radius:14px; }
    .cardEdge i.tr{ right:-1px; top:-1px; border-left:0; border-bottom:0; border-top-right-radius:14px; }
    .cardEdge i.bl{ left:-1px; bottom:-1px; border-right:0; border-top:0; border-bottom-left-radius:14px; }
    .cardEdge i.br{ right:-1px; bottom:-1px; border-left:0; border-top:0; border-bottom-right-radius:14px; }

    /* everything above the fx layers */
    .screen > *{ position:relative; z-index:2; }

    /* ---- ornate animated gold crest ---- */
    .crest{
      width:96px; height:96px; border:0; background:none; box-shadow:none;
      position:relative; margin-bottom:4px;
      animation:rise .9s cubic-bezier(.2,.7,.2,1) both, floaty 6s ease-in-out 1s infinite;
    }
    .crest::before{
      content:""; position:absolute; inset:0; border-radius:50%;
      border:1.5px dashed rgba(230,200,104,.65);
      animation:spin 24s linear infinite;
    }
    .crest::after{
      content:""; position:absolute; left:50%; top:50%;
      width:52px; height:52px; transform:translate(-50%,-50%) rotate(45deg);
      background:linear-gradient(135deg, var(--gold-lt), var(--gold) 42%, var(--gold-dp) 100%);
      box-shadow:0 0 22px rgba(230,200,104,.5), inset 0 0 0 2px rgba(255,255,255,.25);
      border-radius:8px;
      animation:gemPulse 4.5s ease-in-out infinite;
    }
    /* a thin inner ring drawn with a wrapper element via outline on ::after won't stack,
       so we add a second ring using box-shadow rings on the crest itself */
    .crest{ border-radius:50%; box-shadow:0 0 0 1px rgba(230,200,104,.18), 0 0 40px rgba(230,200,104,.10); }

    /* ---- text ---- */
    .tag{
      font-size:13px; letter-spacing:.42em; text-transform:uppercase;
      color:var(--gold); font-weight:600; text-indent:.42em;
      filter:drop-shadow(0 0 10px rgba(230,200,104,.35));
      animation:rise .9s cubic-bezier(.2,.7,.2,1) .15s both;
    }
    .display{
      font-weight:600; line-height:1.04; margin:2px 0;
      font-size:clamp(34px,9vw,58px); letter-spacing:.012em;
      background:linear-gradient(180deg,#fffaf0 0%, var(--gold-lt) 38%, var(--gold) 70%, var(--gold-dp) 100%);
      -webkit-background-clip:text; background-clip:text; -webkit-text-fill-color:transparent; color:transparent;
      filter:drop-shadow(0 2px 18px rgba(230,200,104,.35));
      animation:rise 1s cubic-bezier(.2,.7,.2,1) .3s both;
    }
    .display.sm{ font-size:clamp(24px,6.5vw,32px); }
    .muted{
      color:var(--inkdim); font-size:16px; line-height:1.55; max-width:32ch; margin:2px auto 0;
      animation:rise 1s cubic-bezier(.2,.7,.2,1) .45s both;
    }

    /* ---- shimmer gold button ---- */
    .btn{
      position:relative; margin-top:14px; border:0; cursor:pointer;
      padding:16px 40px; border-radius:999px; overflow:hidden;
      font-family:inherit; font-weight:700; font-size:17px; letter-spacing:.03em;
      color:#3a2a08;
      background:linear-gradient(180deg,#fbe8b0 0%, var(--gold) 46%, var(--gold-dp) 100%);
      box-shadow:0 10px 30px rgba(0,0,0,.38), 0 0 0 1px rgba(255,255,255,.35) inset,
                 0 0 34px rgba(230,200,104,.40);
      animation:rise 1s cubic-bezier(.2,.7,.2,1) .6s both, btnBreath 3.4s ease-in-out 1.6s infinite;
      -webkit-tap-highlight-color:transparent;
    }
    .btn::after{
      content:""; position:absolute; top:0; bottom:0; left:-60%; width:45%;
      background:linear-gradient(105deg, rgba(255,255,255,0) 0%, rgba(255,255,255,.65) 50%, rgba(255,255,255,0) 100%);
      transform:skewX(-18deg); animation:sweep 3.6s ease-in-out 1.8s infinite;
    }
    .btn:active{ transform:scale(.97); }
    .btn:disabled{ opacity:.6; }

    /* ---- refined spinner (loading) ---- */
    .spinner{
      width:46px; height:46px; border-radius:50%;
      border:3px solid rgba(230,200,104,.18); border-top-color:var(--gold);
      box-shadow:0 0 18px rgba(230,200,104,.25);
      animation:spin 1s linear infinite;
    }

    /* ---- keyframes ---- */
    @keyframes rise{ from{ opacity:0; transform:translateY(20px);} to{ opacity:1; transform:translateY(0);} }
    @keyframes floaty{ 0%,100%{ transform:translateY(0);} 50%{ transform:translateY(-7px);} }
    @keyframes spin{ to{ transform:rotate(360deg);} }
    @keyframes spinRays{ to{ transform:translate(-50%,-50%) rotate(360deg);} }
    @keyframes gemPulse{ 0%,100%{ box-shadow:0 0 18px rgba(230,200,104,.45), inset 0 0 0 2px rgba(255,255,255,.22);} 50%{ box-shadow:0 0 34px rgba(230,200,104,.8), inset 0 0 0 2px rgba(255,255,255,.4);} }
    @keyframes btnBreath{ 0%,100%{ box-shadow:0 10px 30px rgba(0,0,0,.38), 0 0 0 1px rgba(255,255,255,.35) inset, 0 0 30px rgba(230,200,104,.36);} 50%{ box-shadow:0 12px 36px rgba(0,0,0,.42), 0 0 0 1px rgba(255,255,255,.45) inset, 0 0 46px rgba(230,200,104,.6);} }
    @keyframes sweep{ 0%{ left:-60%;} 55%{ left:130%;} 100%{ left:130%;} }

    @media (prefers-reduced-motion: reduce){
      .screen::before,.crest,.crest::before,.crest::after,.tag,.display,.muted,.btn,.btn::after,.spinner{ animation:none !important; }
    }
  </style>
</head>
<body>

  <!-- ===================== LOADING ===================== -->
  <section id="screen-loading" class="screen">
    <div class="cardEdge"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
    <div class="crest"></div>
    <div class="spinner"></div>
    <p class="muted">Preparing your invitation…</p>
  </section>

  <!-- ===================== START ===================== -->
  <section id="screen-start" class="screen hidden">
    <canvas id="fxCanvas"></canvas>
    <div class="cardEdge"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
    <div class="crest"></div>
    <div class="tag" id="ssTag">You're Invited</div>
    <h1 id="ssNames" class="display">Our Wedding</h1>
    <p class="muted">Point your camera at the invitation to bring it to life.</p>
    <button id="btnStart" class="btn">Tap to Begin &#10024;</button>
  </section>

  <!-- ===================== ERROR ===================== -->
  <section id="screen-error" class="screen hidden">
    <div class="cardEdge"><i class="tl"></i><i class="tr"></i><i class="bl"></i><i class="br"></i></div>
    <div class="crest"></div>
    <h2 id="errTitle" class="display sm">Something went wrong</h2>
    <p id="errMsg" class="muted"></p>
    <button id="btnRetry" class="btn">Try again</button>
  </section>

  <!-- ===================== IN-AR HUD ===================== -->
  <div id="hud" class="hud hidden">
    <div id="counter"></div>
    <div id="scanHint">Point at the card</div>
    <div id="soundBtn">&#128266;</div>
    <div id="navZoneL" class="navZone"></div>
    <div id="navZoneR" class="navZone"></div>
  </div>

  <!-- AR scene is injected here by the engine -->
  <div id="ar-container"></div>

  <!-- gold sparkle field (start screen only, pauses when hidden, respects reduced-motion) -->
  <script>
  (function(){
    var c=document.getElementById("fxCanvas"); if(!c) return;
    var ctx=c.getContext("2d"), DPR=Math.min(2, window.devicePixelRatio||1);
    var reduce = window.matchMedia && window.matchMedia("(prefers-reduced-motion: reduce)").matches;
    var W=0,H=0,parts=[],sprite=null;
    function makeSprite(){
      var s=document.createElement("canvas"); s.width=s.height=48; var g=s.getContext("2d");
      var rg=g.createRadialGradient(24,24,0,24,24,24);
      rg.addColorStop(0,"rgba(255,244,200,1)"); rg.addColorStop(.35,"rgba(230,200,104,.85)");
      rg.addColorStop(1,"rgba(230,200,104,0)");
      g.fillStyle=rg; g.beginPath(); g.arc(24,24,24,0,7); g.fill(); return s;
    }
    function resize(){
      W=c.clientWidth; H=c.clientHeight; c.width=W*DPR; c.height=H*DPR; ctx.setTransform(DPR,0,0,DPR,0,0);
    }
    function seed(){
      parts=[]; var n=reduce?0:Math.min(54, Math.round(W*H/17000));
      for(var i=0;i<n;i++){
        parts.push({ x:Math.random()*W, y:Math.random()*H,
          r:1.2+Math.random()*3.2, sp:6+Math.random()*16,
          drift:(Math.random()-.5)*10, ph:Math.random()*6.28, tw:.6+Math.random()*1.6 });
      }
    }
    function visible(){ var s=document.getElementById("screen-start"); return s && !s.classList.contains("hidden"); }
    var last=performance.now();
    function frame(now){
      var dt=Math.min(.05,(now-last)/1000); last=now;
      requestAnimationFrame(frame);
      if(!visible()){ return; }
      ctx.clearRect(0,0,W,H);
      for(var i=0;i<parts.length;i++){ var p=parts[i];
        p.y-=p.sp*dt; p.x+=Math.sin(now/1000*0.5+p.ph)*p.drift*dt;
        if(p.y< -10){ p.y=H+10; p.x=Math.random()*W; }
        var a=0.45+0.5*Math.sin(now/1000*p.tw+p.ph); if(a<0)a=0;
        var sz=p.r*4;
        ctx.globalAlpha=a; ctx.drawImage(sprite, p.x-sz/2, p.y-sz/2, sz, sz);
      }
      ctx.globalAlpha=1;
    }
    sprite=makeSprite(); resize(); seed();
    window.addEventListener("resize", function(){ resize(); seed(); });
    requestAnimationFrame(frame);
  })();
  </script>

  <script src="engine/ar.js"></script>
</body>
</html>
